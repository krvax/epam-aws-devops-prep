apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
    environment: lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  # Zero-downtime: nunca bajar de 2 réplicas durante un rolling update
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: nginx
        version: "1.0"
    spec:
      # Distribuir pods en nodos distintos (soft anti-affinity)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [nginx]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: nginx
          image: nginx:1.25.3    # Pin de versión — nunca :latest
          ports:
            - containerPort: 80
          # Siempre definir requests Y limits
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
